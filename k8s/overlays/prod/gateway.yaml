# Gateway for the prod environment.
# Replace shuntwizard.com and api.shuntwizard.com with your real domains.

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prod-gateway
  annotations:
    load-balancer.hetzner.cloud/location: "nbg1"
    load-balancer.hetzner.cloud/use-private-ip: "true"
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

    - name: https-dashboard
      port: 443
      protocol: HTTPS
      hostname: "dashboard.shuntwizard.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: prod-tls-secret
      allowedRoutes:
        namespaces:
          from: Same

    - name: https-api
      port: 443
      protocol: HTTPS
      hostname: "api.shuntwizard.com"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: prod-tls-secret
      allowedRoutes:
        namespaces:
          from: Same

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
spec:
  parentRefs:
    - name: prod-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard-route
spec:
  parentRefs:
    - name: prod-gateway
      sectionName: https-dashboard
  hostnames:
    - "dashboard.shuntwizard.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dashboard-svc
          port: 80

---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
spec:
  parentRefs:
    - name: prod-gateway
      sectionName: https-api
  hostnames:
    - "api.shuntwizard.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend-svc
          port: 80
