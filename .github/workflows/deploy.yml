# CI/CD Pipeline — Shunt Wizard
#
# How it works:
#   Push to "develop" branch  →  builds images, deploys to DEV   (shunt-wizzard-dev namespace)
#   Push to "main" branch     →  builds images, deploys to PROD  (shunt-wizzard-prod namespace)
#
# Required GitHub Secrets (repo → Settings → Secrets and variables → Actions):
#
#   KUBECONFIG_DATA      Your kubeconfig, base64-encoded:
#                        base64 -i /Users/jovan/Downloads/shuntmerlin | pbcopy
#
#   VITE_API_URL_DEV     https://dev-api.yourdomain.com
#   VITE_API_URL_PROD    https://api.yourdomain.com

name: Deploy

on:
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/jovaninviggo/shunt-merlin/backend
  DASHBOARD_IMAGE: ghcr.io/jovaninviggo/shunt-merlin/dashboard

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Determine environment based on branch
      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENVIRONMENT=prod"                         >> $GITHUB_ENV
            echo "K8S_NAMESPACE=shunt-wizzard-prod"        >> $GITHUB_ENV
            echo "KUSTOMIZE_OVERLAY=k8s/overlays/prod"     >> $GITHUB_ENV
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_PROD }}" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev"                         >> $GITHUB_ENV
            echo "K8S_NAMESPACE=shunt-wizzard-dev"         >> $GITHUB_ENV
            echo "KUSTOMIZE_OVERLAY=k8s/overlays/dev"      >> $GITHUB_ENV
            echo "VITE_API_URL=${{ secrets.VITE_API_URL_DEV }}" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: packages/backend
          file: packages/backend/Dockerfile
          target: production
          push: true
          # Build for both Intel (amd64) and ARM (arm64) — Hetzner nodes are arm64
          platforms: linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:${{ env.ENVIRONMENT }}-latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache-${{ env.ENVIRONMENT }}
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:cache-${{ env.ENVIRONMENT }},mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: packages/dashboard
          file: packages/dashboard/Dockerfile
          push: true
          platforms: linux/arm64
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            ${{ env.DASHBOARD_IMAGE }}:${{ env.ENVIRONMENT }}-latest
          cache-from: type=registry,ref=${{ env.DASHBOARD_IMAGE }}:cache-${{ env.ENVIRONMENT }}
          cache-to: type=registry,ref=${{ env.DASHBOARD_IMAGE }}:cache-${{ env.ENVIRONMENT }},mode=max

      - name: Set up kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Apply cluster-scoped resources (safe to re-run — kubectl apply is idempotent)
      - name: Apply cluster-scoped resources
        run: |
          kubectl apply -f k8s/gateway-class.yaml
          kubectl apply -f k8s/cert-manager-issuer.yaml

      # kubectl apply -k applies the kustomize overlay for the right environment
      - name: Apply Kubernetes manifests
        run: kubectl apply -k ${{ env.KUSTOMIZE_OVERLAY }}

      # Update to the exact image SHA so Kubernetes knows to pull the new version
      - name: Roll out new images
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/dashboard \
            dashboard=${{ env.DASHBOARD_IMAGE }}:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

      # Fail the workflow if the rollout doesn't succeed within 5 minutes
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/dashboard -n ${{ env.K8S_NAMESPACE }} --timeout=5m

      - name: Summary
        run: |
          echo "Deployed ${{ github.sha }} to ${{ env.ENVIRONMENT }}"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }}
