apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Every resource from base gets deployed into this namespace
namespace: shunt-wizzard-dev

resources:
  - ../../base

# Dev-specific resources (namespace + ingress with dev URLs)
resources:
  - namespace.yaml
  - gateway.yaml

# Patch the configmap to set the dev dashboard origin
patches:
  - path: backend-configmap-patch.yaml
    target:
      kind: ConfigMap
      name: backend-config
